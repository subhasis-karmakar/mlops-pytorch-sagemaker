name: Setup SageMaker Monitoring

on:
  workflow_dispatch:
    inputs:
      monitor_type:
        description: "data_quality | model_quality | both"
        required: true
        default: "both"

jobs:
  setup-monitoring:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup selected monitor
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
          MONITOR_INSTANCE_TYPE: ml.m5.xlarge
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)

          MODE="${{ github.event.inputs.monitor_type }}"

          if [ "$MODE" = "data_quality" ]; then
            python src/setup_data_monitor.py
          elif [ "$MODE" = "model_quality" ]; then
            python src/setup_model_quality_monitor.py
          elif [ "$MODE" = "both" ]; then
            python src/setup_data_monitor.py
            python src/setup_model_quality_monitor.py
          else
            echo "Unsupported monitor_type: $MODE"
            exit 1
          fi