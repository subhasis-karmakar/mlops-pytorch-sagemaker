name: Setup Retraining Automation

on:
  workflow_dispatch:
    inputs:
      lambda_role_arn:
        description: "IAM role ARN for Lambda"
        required: true
        default: "arn:aws:iam::628479576048:role/LambdaRetrainRole"
      account_id:
        description: "AWS Account ID"
        required: true
        default: "628479576048"
      pipeline_name:
        description: "SageMaker pipeline name"
        required: true
        default: "PyTorchMLOpsPipeline"
      accuracy_threshold:
        description: "Accuracy threshold for retraining trigger"
        required: true
        default: "0.50"
      endpoint_name:
        description: "SageMaker endpoint name"
        required: true
        default: "pytorch-mlops-registry-endpoint"

jobs:
  setup-retraining:
    runs-on: ubuntu-latest

    env:
      AWS_DEFAULT_REGION: us-west-2
      LAMBDA_FUNCTION_NAME: pytorch-mlops-trigger-retraining
      EVENTBRIDGE_RULE_NAME: pytorch-mlops-retraining-rule
      ALARM_NAME: pytorch-mlops-endpoint-5xx
      SNS_TOPIC_NAME: pytorch-mlops-alerts
      EMAIL: subhasis18.karmakar@gmail.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Package Lambda
        run: |
          mkdir -p build/lambda
          cp src/trigger_retraining.py build/lambda/trigger_retraining.py
          cd build/lambda
          zip -r retraining_lambda.zip trigger_retraining.py

      - name: Create SNS topic
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -e
          TOPIC_ARN=$(aws sns create-topic \
            --name "$SNS_TOPIC_NAME" \
            --region "$AWS_DEFAULT_REGION" \
            --query 'TopicArn' \
            --output text)

          echo "SNS_TOPIC_ARN=$TOPIC_ARN" >> "$GITHUB_ENV"
          echo "Using SNS topic: $TOPIC_ARN"

      - name: Subscribe email to SNS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -e
          EXISTING=$(aws sns list-subscriptions-by-topic \
            --topic-arn "$SNS_TOPIC_ARN" \
            --region "$AWS_DEFAULT_REGION" \
            --query "Subscriptions[?Endpoint=='$EMAIL'].SubscriptionArn | [0]" \
            --output text)

          if [ "$EXISTING" = "None" ] || [ -z "$EXISTING" ]; then
            aws sns subscribe \
              --topic-arn "$SNS_TOPIC_ARN" \
              --protocol email \
              --notification-endpoint "$EMAIL" \
              --region "$AWS_DEFAULT_REGION"
            echo "Subscription created. Confirm it from your email inbox."
          else
            echo "Email already subscribed: $EXISTING"
          fi

      - name: Create or update Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          LAMBDA_ROLE_ARN: ${{ github.event.inputs.lambda_role_arn }}
          PIPELINE_NAME: ${{ github.event.inputs.pipeline_name }}
          ACCURACY_THRESHOLD: ${{ github.event.inputs.accuracy_threshold }}
        run: |
          set -e

          if aws lambda get-function \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_DEFAULT_REGION" > /dev/null 2>&1; then

            echo "Updating Lambda code..."
            aws lambda update-function-code \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --zip-file fileb://build/lambda/retraining_lambda.zip \
              --region "$AWS_DEFAULT_REGION"

            echo "Updating Lambda configuration..."
            aws lambda update-function-configuration \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --role "$LAMBDA_ROLE_ARN" \
              --runtime python3.9 \
              --handler trigger_retraining.lambda_handler \
              --environment "Variables={PIPELINE_NAME=$PIPELINE_NAME,ACCURACY_THRESHOLD=$ACCURACY_THRESHOLD}" \
              --region "$AWS_DEFAULT_REGION"
          else
            echo "Creating Lambda..."
            aws lambda create-function \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --runtime python3.9 \
              --handler trigger_retraining.lambda_handler \
              --zip-file fileb://build/lambda/retraining_lambda.zip \
              --role "$LAMBDA_ROLE_ARN" \
              --environment "Variables={PIPELINE_NAME=$PIPELINE_NAME,ACCURACY_THRESHOLD=$ACCURACY_THRESHOLD}" \
              --region "$AWS_DEFAULT_REGION"
          fi

      - name: Create or update EventBridge rule
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -e
          aws events put-rule \
            --name "$EVENTBRIDGE_RULE_NAME" \
            --event-pattern file://infra/eventbridge-rule.json \
            --state ENABLED \
            --description "Trigger retraining when selected MLOps alarms move to ALARM state" \
            --region "$AWS_DEFAULT_REGION"

      - name: Attach Lambda target
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: |
          set -e
          aws events put-targets \
            --rule "$EVENTBRIDGE_RULE_NAME" \
            --targets "Id"="1","Arn"="arn:aws:lambda:${AWS_DEFAULT_REGION}:${ACCOUNT_ID}:function:${LAMBDA_FUNCTION_NAME}" \
            --region "$AWS_DEFAULT_REGION"

      - name: Allow EventBridge to invoke Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
        run: |
          set +e
          aws lambda add-permission \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --statement-id allow-eventbridge \
            --action lambda:InvokeFunction \
            --principal events.amazonaws.com \
            --source-arn "arn:aws:events:${AWS_DEFAULT_REGION}:${ACCOUNT_ID}:rule/${EVENTBRIDGE_RULE_NAME}" \
            --region "$AWS_DEFAULT_REGION"
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "Permission may already exist. Continuing."
          fi

      - name: Create or update CloudWatch alarm
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ENDPOINT_NAME: ${{ github.event.inputs.endpoint_name }}
        run: |
          set -e
          aws cloudwatch put-metric-alarm \
            --alarm-name "$ALARM_NAME" \
            --metric-name Invocation5XXErrors \
            --namespace AWS/SageMaker \
            --statistic Sum \
            --period 300 \
            --threshold 1 \
            --comparison-operator GreaterThanOrEqualToThreshold \
            --evaluation-periods 1 \
            --alarm-actions "$SNS_TOPIC_ARN" \
            --dimensions Name=EndpointName,Value="$ENDPOINT_NAME" \
            --region "$AWS_DEFAULT_REGION"

      - name: Test Lambda retraining trigger
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -e
          aws lambda invoke \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --payload '{}' \
            response.json \
            --region "$AWS_DEFAULT_REGION"

          echo "Lambda response:"
          cat response.json

      - name: Verify created resources
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ACCOUNT_ID: ${{ github.event.inputs.account_id }}
          PIPELINE_NAME: ${{ github.event.inputs.pipeline_name }}
        run: |
          set -e
          echo "=== EventBridge rule ==="
          aws events describe-rule \
            --name "$EVENTBRIDGE_RULE_NAME" \
            --region "$AWS_DEFAULT_REGION"

          echo "=== EventBridge targets ==="
          aws events list-targets-by-rule \
            --rule "$EVENTBRIDGE_RULE_NAME" \
            --region "$AWS_DEFAULT_REGION"

          echo "=== Lambda function ==="
          aws lambda get-function \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_DEFAULT_REGION" \
            --query 'Configuration.[FunctionName,Runtime,Handler,Role]' \
            --output table

          echo "=== CloudWatch alarm ==="
          aws cloudwatch describe-alarms \
            --alarm-names "$ALARM_NAME" \
            --region "$AWS_DEFAULT_REGION"

          echo "=== SNS topic subscriptions ==="
          aws sns list-subscriptions-by-topic \
            --topic-arn "$SNS_TOPIC_ARN" \
            --region "$AWS_DEFAULT_REGION"

          echo "=== Recent pipeline executions ==="
          aws sagemaker list-pipeline-executions \
            --pipeline-name "$PIPELINE_NAME" \
            --region "$AWS_DEFAULT_REGION"