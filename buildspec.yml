version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo "Installing dependencies..."
      - pip install --upgrade pip
      - pip install -r requirements.txt
  pre_build:
    commands:
      - echo "Running lint and tests..."
      - pip install pytest flake8
      - flake8 src/
      - pytest tests/ || echo "No tests found, skipping"
  build:
    commands:
      - echo "Starting SageMaker pipeline execution..."
      - python sagemaker_pipeline.py
  post_build:
    commands:
      - echo "Build completed successfully."

artifacts:
  files:
    - '**/*'
  discard-paths: yes
